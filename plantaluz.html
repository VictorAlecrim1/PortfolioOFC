<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planta que Gera Luz - Projeto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --main-color: #c5a059;
            --plant-color: #0e2413; 
            --glow-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; }

        body {
            background: linear-gradient(135deg, var(--plant-color) 0%, var(--bg-color) 60%);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        header {
            padding: 20px 10%;
            background: rgba(11, 11, 11, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            color: var(--main-color); font-size: 18px; font-weight: 600;
            transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .back-btn:hover { text-shadow: var(--glow-shadow); transform: translateX(-5px); }

        .project-container {
            padding: 120px 10% 80px;
            display: flex; flex-direction: column; align-items: center;
        }
        .heading { font-size: 40px; margin-bottom: 10px; text-align: center; }
        .heading span { color: var(--main-color); text-shadow: var(--glow-shadow); }
        .sub-heading { color: #ccc; text-align: center; margin-bottom: 30px; }

        .video-box {
            width: 100%; max-width: 900px; margin: 20px 0;
            border: 2px solid var(--main-color); border-radius: 15px;
            box-shadow: 0 0 20px rgba(14, 255, 66, 0.1);
            overflow: hidden; background: #000;
        }
        .video-box video { width: 100%; display: block; }

        .project-details {
            max-width: 900px; width: 100%; background: rgba(20, 20, 20, 0.7);
            padding: 40px; border-radius: 15px; border-left: 4px solid var(--main-color);
            margin-top: 30px; line-height: 1.8; font-size: 16px;
        }

        /* --- Animações --- */
        .hidden { opacity: 0; transform: translateY(50px); transition: all 0.8s ease-out; }
        .show { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.4s; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar ao Portfólio</a>
    </header>

    <div class="project-container">
        <h1 class="heading hidden">Planta que Gera <span>Luz</span></h1>
        <p class="sub-heading hidden">Energia renovável através do processo natural de fotossíntese.</p>

        <div class="video-box hidden delay-1">
            <video controls poster="https://via.placeholder.com/900x500/141414/c5a059?text=Capa+do+Vídeo">
                <source src="seu-video-planta.mp4" type="video/mp4">
                Seu navegador não suporta a tag de vídeo.
            </video>
        </div>

        <div class="project-details hidden delay-2">
            <h2 style="color: var(--main-color); margin-bottom: 15px;">A Ciência por Trás</h2>
            <p>
                Em breve
                Em breve
            </p>
        </div>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        });

        const hiddenElements = document.querySelectorAll('.hidden');
        hiddenElements.forEach((el) => observer.observe(el));
    </script>
</body>
</html>
